name: Validate

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  portable-system:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: ./validate.sh
      - run: git diff --check
